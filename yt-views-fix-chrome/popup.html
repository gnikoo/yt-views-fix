<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Views Fix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #0f0f0f;
      color: #f1f1f1;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #272727;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      background: #ff3232;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 16px; height: 16px; }
    .header-text h1 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      line-height: 1.2;
    }
    .header-text p {
      font-size: 11px;
      color: #aaa;
      margin-top: 1px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 11px 16px;
      border-bottom: 1px solid #272727;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2ecc71;
      flex-shrink: 0;
    }
    .status-text {
      font-size: 11px;
      color: #2ecc71;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #272727;
    }
    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 10px;
      background: #272727;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #e0e0e0;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #333; }
    .btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      fill: currentColor;
    }

    .footer {
      padding: 9px 16px;
      font-size: 10px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">
      <!-- Eye icon — represents viewing/restoring view counts -->
      <svg viewBox="0 0 24 24" fill="white">
        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>YT Views Fix</h1>
      <p>Restoring classic view count layout</p>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    <span class="status-text">Active — classic layout applied</span>
  </div>

  <div class="btn-row">
    <a class="btn" id="donateBtn" href="https://ko-fi.com/gnik0074" target="_blank">
      <svg viewBox="0 0 24 24">
        <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/>
      </svg>
      Tip
    </a>
    <a class="btn" id="rateBtn" href="#" target="_blank">
      <svg viewBox="0 0 24 24">
        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
      </svg>
      Rate
    </a>
  </div>

  <div class="footer">v1.0.4 · YT Views Fix</div>

  <script src="popup.js"></script>
</body>
</html>
